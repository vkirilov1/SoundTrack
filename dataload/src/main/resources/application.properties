#Cover image storage - must match the path configured in the api module
cover.storage.path=E:/AlbumCovers

#Artist photo storage - must match the path configured in the api module
artist.photo.storage.path=E:/ArtistPhotos

#Spring configuration
spring.datasource.url=
spring.datasource.username=
spring.datasource.password=

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

#Logging configuration
logging.level.root=INFO
logging.level.org.soundtrack=DEBUG
logging.pattern.console=%d{HH:mm:ss} [%level] %logger - %msg%n